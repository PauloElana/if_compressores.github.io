<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IF Compressores — Equipamentos</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Filtros e busca */
    .filtros-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--dark3);
      border-radius: 8px;
      border: 1px solid var(--gray);
    }

    .filtro-grupo {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filtro-grupo label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-mid);
      font-weight: 600;
    }

    .filtro-grupo input,
    .filtro-grupo select {
      padding: 10px 12px;
      background: var(--dark2);
      border: 1px solid var(--gray);
      border-radius: 6px;
      color: var(--white);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .filtro-grupo input:focus,
    .filtro-grupo select:focus {
      outline: none;
      border-color: var(--red);
      background: rgba(255, 0, 0, 0.05);
    }

    .btn-filtros {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .btn-filtros button {
      padding: 10px 16px;
      font-size: 12px;
    }

    /* Grid de equipamentos */
    .equipamentos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .equipamento-card {
      background: var(--dark3);
      border: 1px solid var(--gray);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .equipamento-card:hover {
      border-color: var(--red);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(255, 0, 0, 0.1);
    }

    .equipamento-imagem {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, var(--dark2) 0%, var(--dark) 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      border-bottom: 1px solid var(--gray);
      position: relative;
    }

    .equipamento-imagem img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .equipamento-card:hover .equipamento-imagem img {
      transform: scale(1.05);
    }

    .equipamento-imagem-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--gray-mid);
    }

    .equipamento-conteudo {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .equipamento-header {
      border-bottom: 1px solid var(--gray);
      padding-bottom: 12px;
    }

    .equipamento-marca {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-mid);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .equipamento-modelo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .equipamento-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 12px;
    }

    .equipamento-info-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .equipamento-info-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray-mid);
      font-weight: 600;
    }

    .equipamento-info-valor {
      color: var(--white2);
      font-weight: 500;
    }

    .equipamento-footer {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--gray);
      margin-top: auto;
    }

    .equipamento-footer button {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    .btn-visualizar {
      background: var(--red);
      color: white;
    }

    .btn-visualizar:hover {
      background: #cc0000;
    }

    .btn-editar {
      background: var(--dark2);
      color: var(--white2);
      border: 1px solid var(--gray);
    }

    .btn-editar:hover {
      border-color: var(--red);
      color: var(--white);
    }

    /* Estado vazio */
    .vazio-container {
      grid-column: 1 / -1;
      padding: 60px 20px;
      text-align: center;
    }

    .vazio-container .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    /* Estatísticas */
    .estatisticas-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--dark3);
      border: 1px solid var(--gray);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-valor {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--red-light);
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-mid);
      font-weight: 600;
    }

    .loading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card-skeleton {
      background: var(--dark3);
      border-radius: 10px;
      height: 380px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .filtros-container {
        grid-template-columns: 1fr;
      }

      .equipamentos-grid {
        grid-template-columns: 1fr;
      }

      .equipamento-info {
        grid-template-columns: 1fr;
      }

      .btn-filtros {
        flex-direction: column;
      }

      .btn-filtros button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="dashboard.html">
        <div class="logo-icon"><img src="logo.png" alt="IF Compressores"></div>
        <div class="logo-text">
          <span class="logo-name">IF Compressores</span>
          <span class="logo-sub">Sistema de Gestão</span>
        </div>
      </a>
      <span class="header-title">Equipamentos</span>
      <div class="nav-actions">
        <a class="btn-nav" href="index.html">➕ <span>Novo</span></a>
        <a class="btn-nav home" href="dashboard.html">🏠 <span>Início</span></a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="page-title">Equipamentos <span>Cadastrados</span></div>
    <div class="page-subtitle">Consulte todos os compressores do sistema</div>

    <!-- Estatísticas -->
    <div class="estatisticas-container" id="estatisticas">
      <div class="stat-card">
        <div class="stat-valor" id="total-equipamentos">0</div>
        <div class="stat-label">Total de Equipamentos</div>
      </div>
      <div class="stat-card">
        <div class="stat-valor" id="total-marcas">0</div>
        <div class="stat-label">Marcas Diferentes</div>
      </div>
      <div class="stat-card">
        <div class="stat-valor" id="total-clientes">0</div>
        <div class="stat-label">Clientes Únicos</div>
      </div>
      <div class="stat-card">
        <div class="stat-valor" id="total-cidades">0</div>
        <div class="stat-label">Cidades com Equipamentos</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="card">
      <div class="card-title">🔍 Filtros</div>
      <div class="filtros-container">
        <div class="filtro-grupo">
          <label>Buscar por Série/Modelo</label>
          <input type="text" id="filtro-busca" placeholder="Ex: SRP-042, Schulz...">
        </div>
        <div class="filtro-grupo">
          <label>Marca</label>
          <select id="filtro-marca">
            <option value="">Todas as marcas</option>
          </select>
        </div>
        <div class="filtro-grupo">
          <label>Cliente</label>
          <select id="filtro-cliente">
            <option value="">Todos os clientes</option>
          </select>
        </div>
        <div class="filtro-grupo">
          <label>Tipo</label>
          <select id="filtro-tipo">
            <option value="">Todos os tipos</option>
          </select>
        </div>
        <div class="btn-filtros">
          <button class="btn btn-primary" onclick="aplicarFiltros()">🔎 Filtrar</button>
          <button class="btn btn-ghost" onclick="limparFiltros()">↻ Limpar</button>
        </div>
      </div>
    </div>

    <!-- Grid de equipamentos -->
    <div id="grid-container">
      <div class="loading-grid">
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
        <div class="card-skeleton"></div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>

    // Verifica sessão
    (async () => {
      try {
        if (!window.db) return;
        const { data } = await window.db.auth.getSession();
        if (!data.session) window.location.href = "login.html";
      } catch(e) {
        console.warn("Sessão não verificada:", e);
      }
    })();

    let equipamentosCompleto = [];
    let equipamentosFiltrados = [];

    /**
     * Carregar todos os equipamentos do banco de dados
     */
    async function carregarEquipamentos() {
      try {
        const { data, error } = await window.db
          .from("if-compressores")
          .select("*")
          .order("id", { ascending: true });

        if (error) throw error;

        equipamentosCompleto = data || [];
        equipamentosFiltrados = [...equipamentosCompleto];

        atualizarEstatisticas();
        preencherFiltros();
        renderizarGrid();

      } catch (error) {
        console.error("Erro ao carregar equipamentos:", error);
        document.getElementById('grid-container').innerHTML = `
          <div class="vazio-container">
            <div class="empty-state">
              <div class="empty-state-icon">❌</div>
              <div class="empty-state-text">Erro ao carregar equipamentos</div>
              <p style="color: var(--gray-mid); margin-top: 8px;">${error.message}</p>
            </div>
          </div>
        `;
      }
    }

    /**
     * Atualizar estatísticas
     */
    function atualizarEstatisticas() {
      const totalEquipamentos = equipamentosCompleto.length;
      const marcasUnicas = new Set(equipamentosCompleto.map(e => e.marca).filter(Boolean));
      const clientesUnicos = new Set(equipamentosCompleto.map(e => e.cliente).filter(Boolean));
      const cidadesUnicas = new Set(equipamentosCompleto.map(e => e.cidade).filter(Boolean));

      document.getElementById('total-equipamentos').textContent = totalEquipamentos;
      document.getElementById('total-marcas').textContent = marcasUnicas.size;
      document.getElementById('total-clientes').textContent = clientesUnicos.size;
      document.getElementById('total-cidades').textContent = cidadesUnicas.size;
    }

    /**
     * Preencher opções dos filtros
     */
    function preencherFiltros() {
      const marcas = new Set(equipamentosCompleto.map(e => e.marca).filter(Boolean));
      const clientes = new Set(equipamentosCompleto.map(e => e.cliente).filter(Boolean));
      const tipos = new Set(equipamentosCompleto.map(e => e.tipo).filter(Boolean));

      // Preencher marca
      const selectMarca = document.getElementById('filtro-marca');
      [...marcas].sort().forEach(marca => {
        const option = document.createElement('option');
        option.value = marca;
        option.textContent = marca;
        selectMarca.appendChild(option);
      });

      // Preencher cliente
      const selectCliente = document.getElementById('filtro-cliente');
      [...clientes].sort().forEach(cliente => {
        const option = document.createElement('option');
        option.value = cliente;
        option.textContent = cliente;
        selectCliente.appendChild(option);
      });

      // Preencher tipo
      const selectTipo = document.getElementById('filtro-tipo');
      [...tipos].sort().forEach(tipo => {
        const option = document.createElement('option');
        option.value = tipo;
        option.textContent = tipo;
        selectTipo.appendChild(option);
      });
    }

    /**
     * Aplicar filtros
     */
    function aplicarFiltros() {
      const busca = document.getElementById('filtro-busca').value.toLowerCase();
      const marca = document.getElementById('filtro-marca').value;
      const cliente = document.getElementById('filtro-cliente').value;
      const tipo = document.getElementById('filtro-tipo').value;

      equipamentosFiltrados = equipamentosCompleto.filter(eq => {
        const correspondeBusca = !busca || 
          eq.serie?.toLowerCase().includes(busca) ||
          eq.modelo?.toLowerCase().includes(busca) ||
          eq.marca?.toLowerCase().includes(busca) ||
          eq.cliente?.toLowerCase().includes(busca);

        const correspondeMarca = !marca || eq.marca === marca;
        const correspondeCliente = !cliente || eq.cliente === cliente;
        const correspondeTipo = !tipo || eq.tipo === tipo;

        return correspondeBusca && correspondeMarca && correspondeCliente && correspondeTipo;
      });

      renderizarGrid();
    }

    /**
     * Limpar filtros
     */
    function limparFiltros() {
      document.getElementById('filtro-busca').value = '';
      document.getElementById('filtro-marca').value = '';
      document.getElementById('filtro-cliente').value = '';
      document.getElementById('filtro-tipo').value = '';

      equipamentosFiltrados = [...equipamentosCompleto];
      renderizarGrid();
    }

    /**
     * Renderizar grid de equipamentos
     */
    function renderizarGrid() {
      const container = document.getElementById('grid-container');

      if (equipamentosFiltrados.length === 0) {
        container.innerHTML = `
          <div class="vazio-container">
            <div class="empty-state">
              <div class="empty-state-icon">🔍</div>
              <div class="empty-state-text">Nenhum equipamento encontrado</div>
              <p style="color: var(--gray-mid); margin-top: 8px;">Tente ajustar os filtros ou cadastrar um novo equipamento</p>
            </div>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="equipamentos-grid">
          ${equipamentosFiltrados.map(eq => criarCardEquipamento(eq)).join('')}
        </div>
      `;
    }

    /**
     * Criar card de equipamento
     */
    function criarCardEquipamento(eq) {
      const imagemHtml = eq.foto_capa_url
        ? `<img src="${eq.foto_capa_url}" alt="${eq.modelo}">`
        : `
          <div class="equipamento-imagem-placeholder">
            <span style="font-size: 48px;">⚙️</span>
            <span style="font-size: 11px;">Sem imagem</span>
          </div>
        `;

      return `
        <div class="equipamento-card">
          <div class="equipamento-imagem">
            ${imagemHtml}
          </div>
          
          <div class="equipamento-conteudo">
            <div class="equipamento-header">
              <div class="equipamento-marca">${eq.marca || '—'}</div>
              <div class="equipamento-modelo">${eq.modelo || 'Sem modelo'}</div>
            </div>

            <div class="equipamento-info">
              <div class="equipamento-info-item">
                <div class="equipamento-info-label">🔢 Série</div>
                <div class="equipamento-info-valor">${eq.serie || '—'}</div>
              </div>
              <div class="equipamento-info-item">
                <div class="equipamento-info-label">📦 Tipo</div>
                <div class="equipamento-info-valor">${eq.tipo || '—'}</div>
              </div>
              <div class="equipamento-info-item">
                <div class="equipamento-info-label">👥 Cliente</div>
                <div class="equipamento-info-valor" style="font-size: 11px;">${eq.cliente || '—'}</div>
              </div>
              <div class="equipamento-info-item">
                <div class="equipamento-info-label">📍 Cidade</div>
                <div class="equipamento-info-valor" style="font-size: 11px;">${eq.cidade || '—'}</div>
              </div>
              ${eq.potencia ? `
                <div class="equipamento-info-item">
                  <div class="equipamento-info-label">⚡ Potência</div>
                  <div class="equipamento-info-valor">${eq.potencia}</div>
                </div>
              ` : ''}
              ${eq.pressao ? `
                <div class="equipamento-info-item">
                  <div class="equipamento-info-label">🔴 Pressão</div>
                  <div class="equipamento-info-valor">${eq.pressao}</div>
                </div>
              ` : ''}
            </div>

            <div class="equipamento-footer">
              <button class="btn-visualizar" onclick="window.location.href='visualizacao.html?id=${eq.id}'">
                👁️ Visualizar
              </button>
              <button class="btn-editar" onclick="abrirEdicao('${eq.id}')">
                ✏️ Editar
              </button>
            </div>
          </div>
        </div>
      `;
    }

    /**
     * Abrir página de edição
     */
    function abrirEdicao(id) {
      alert('Funcionalidade de edição em desenvolvimento. ID: ' + id);
      // window.location.href = `editar.html?id=${id}`;
    }

    // Inicializar
    carregarEquipamentos();

  </script>

</body>
</html>
