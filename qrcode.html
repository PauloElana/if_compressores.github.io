<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IF Compressores — Etiqueta QR</title>
<link rel="stylesheet" href="style.css">

<script src="config.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="dashboard.html">
      <div class="logo-icon">
        <img src="logo.png" alt="IF Compressores" style="width:200px;height:300px;object-fit:contain;border-radius:6px;">
      </div>
    </a>
    <span class="header-title">Etiqueta QR</span>
    <div class="nav-actions">
      <a class="btn-nav home" href="dashboard.html">🏠 <span>Início</span></a>
    </div>
  </div>
</header>

<div class="container">
  <div class="page-title">Etiqueta <span>QR Code</span></div>
  <div class="page-subtitle">Equipamento cadastrado com sucesso!</div>

  <div class="card">
    <div class="qr-wrapper" style="display: flex; flex-direction: column; align-items: center; padding: 20px;">
      <div id="qrcode-container"></div>
      
      <div id="codigo" style="margin-top: 15px; text-align: center;"></div>
      
      <p style="color:var(--gray-mid);font-size:13px;margin-top:20px; text-align: center;">
        Escaneie o QR Code para acessar a ficha técnica do compressor
      </p>
    </div>
  </div>

  <div class="btn-actions">
    <a class="btn btn-ghost" href="index.html">➕ Novo Equipamento</a>
    <button class="btn btn-secondary" onclick="history.back()">← Voltar</button>
    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir Etiqueta</button>
  </div>
</div>

<script>
/**
 * O uso de window.onload garante que o CONFIG e a biblioteca externa 
 * já foram carregados antes da execução.
 */
window.onload = function() {
    // Verificação de segurança para o objeto CONFIG
    if (typeof window.CONFIG === 'undefined') {
        console.error("ERRO: O arquivo config.js não foi carregado corretamente.");
        document.getElementById('codigo').innerHTML = "<span style='color:red'>Erro: Configurações não carregadas.</span>";
        return;
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    // Tenta obter a série da URL; caso contrário, usa o ID como fallback
    const serie = params.get("serie") || id; 

    if (id) {
        const urlFicha = `${window.location.origin}/visualizacao.html?id=${id}`;
        const container = document.getElementById("qrcode-container");
        
        // Criar elemento Canvas para permitir a inserção da Logo
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);

        // Gerar QR Code usando a biblioteca carregada no head
        QRCode.toCanvas(canvas, urlFicha, {
            width: 250,
            margin: 2,
            errorCorrectionLevel: 'H', // Necessário para a logo não corromper a leitura
            color: {
                dark: "#000000",
                light: "#ffffff"
            }
        }, function (error) {
            if (error) {
                console.error("Erro ao gerar QR Code:", error);
                return;
            }
            
            // Lógica para desenhar a Logo no centro do QR Code
            const ctx = canvas.getContext('2d');
            const logo = new Image();
            logo.src = 'logo.png'; 
            
            logo.onload = function() {
                const logoSize = canvas.width * 0.22; // Define a logo como 22% do tamanho total
                const x = (canvas.width - logoSize) / 2;
                const y = (canvas.height - logoSize) / 2;
                
                // Desenha um fundo branco sob a logo para garantir contraste
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(x - 2, y - 2, logoSize + 4, logoSize + 4);
                ctx.drawImage(logo, x, y, logoSize, logoSize);
            };
        });

        // Aplica a cor primária definida no seu config.js
        const corPrimaria = window.CONFIG.CORES.primaria || "#c40000";
        
        document.getElementById("codigo").innerHTML = `
            <div style="border-top: 1px solid #eee; padding-top: 10px;">
                <span style="font-size: 11px; color: #666; font-weight: bold; text-transform: uppercase;">Nº de Série</span><br>
                <span style="font-size: 28px; color: ${corPrimaria}; font-weight: 800; font-family: 'Barlow Condensed', sans-serif;">
                    ${serie}
                </span>
            </div>
        `;
    } else {
        document.getElementById('qrcode-container').innerHTML = '<p style="color:red;">ID do equipamento não fornecido.</p>';
    }
};
</script>

<style>
  /* Otimização para impressão */
  @media print {
    header, .btn-actions, .page-title, .page-subtitle { display: none !important; }
    .container { width: 100%; padding: 0; margin: 0; }
    .card { border: none; box-shadow: none; background: white; }
    body { background: white; }
  }
</style>

</body>
</html>
