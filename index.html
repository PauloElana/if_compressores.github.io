<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IF Compressores — Cadastrar Equipamento</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <!-- ... seu header permanece igual ... -->
</header>

<div class="container">
  <!-- ... seus cards de formulário permanecem iguais ... -->

  <div class="btn-actions">
    <button class="btn btn-ghost" onclick="limpar()">🗑️ Limpar</button>
    <button class="btn btn-secondary" onclick="history.back()">← Voltar</button>
    <button class="btn btn-primary" id="btn-salvar" onclick="salvar()">💾 Salvar e Gerar QR</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  function limpar() {
    ['tipo','marca','modelo','serie','potencia','pressao',
     'vazao','tensao','horimetro','cliente','cidade']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('foto-equipamento').value = '';
    document.getElementById('foto-equipamento-preview').innerHTML = `
      <div class="cover-upload-placeholder">
        <span style="font-size: 2em; display: block; margin-bottom: 10px;">📷</span>
        <p>Clique ou arraste uma foto aqui</p>
      </div>
    `;
  }

  async function salvar() {
    const btn = document.getElementById('btn-salvar');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    const tipo   = document.getElementById('tipo').value.trim();
    const marca  = document.getElementById('marca').value.trim();
    const modelo = document.getElementById('modelo').value.trim();
    const serieVal = document.getElementById('serie').value.trim();

    if (!tipo || !marca || !modelo || !serieVal) {
      alert("Preencha ao menos: Tipo, Marca, Modelo e Série.");
      btn.disabled = false;
      btn.textContent = '💾 Salvar e Gerar QR';
      return;
    }

    // Upload da foto
    let fotoEquipamentoUrl = null;
    const fotoEquipamentoFile = document.getElementById('foto-equipamento').files[0];
    if (fotoEquipamentoFile) {
      fotoEquipamentoUrl = await uploadImagemEquipamento(fotoEquipamentoFile);
    }

    const dados = {
      id: serieVal, // usa série como identificador
      tipo,
      marca,
      modelo,
      serie: serieVal,
      potencia: document.getElementById('potencia').value.trim(),
      pressao: document.getElementById('pressao').value.trim(),
      vazao: document.getElementById('vazao').value.trim(),
      tensao: document.getElementById('tensao').value.trim(),
      horimetro: parseFloat(document.getElementById('horimetro').value) || 0,
      cliente: document.getElementById('cliente').value.trim(),
      cidade: document.getElementById('cidade').value.trim(),
      foto_capa_url: fotoEquipamentoUrl,
      created_at: new Date().toISOString()
    };

    // ⚠️ Nome da tabela corrigido: if_compressores
    const { error } = await window.db.from("if_compressores").insert([dados]);

    if (error) {
      console.error("Erro Supabase:", error);
      alert("Erro ao salvar:\n" + error.message);
      btn.disabled = false;
      btn.textContent = '💾 Salvar e Gerar QR';
      return;
    }

    // Sucesso
    window.location.href = "qrcode.html?id=" + serieVal;
  }
</script>
</body>
</html>
